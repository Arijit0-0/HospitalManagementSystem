{% extends 'base.html' %}

{% block title %}Edit Booking{% endblock title %}

{% block body %}
<section class="container section-space">
    <div class="panel-card panel-card--wide">
        <div class="panel-card__header">
            <p class="eyebrow">Update Appointment</p>
            <h2>Edit booking for patient #{{ posts.pid }}</h2>
        </div>
        <form action="/edit/{{ posts.pid }}" method="post" class="app-form form-grid">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" id="email" value="{{ current_user.email }}" name="email" required>
            </div>
            <div class="form-group">
                <label for="name">Patient name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ posts.name }}" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select class="form-control" id="gender" name="gender" required>
                    <option selected>{{ posts.gender }}</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            <div class="form-group">
                <label for="slot">Preferred slot</label>
                <select class="form-control" id="slot" name="slot" required>
                    <option selected>{{ posts.slot }}</option>
                    <option value="morning">Morning</option>
                    <option value="evening">Evening</option>
                    <option value="night">Night</option>
                </select>
            </div>
            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" class="form-control" id="time" value="{{ posts.time }}" name="time" required>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" class="form-control" id="date" value="{{ posts.date }}" name="date" required>
            </div>
            <div class="form-group">
                <label for="disease">Primary concern</label>
                <input type="text" class="form-control" id="disease" value="{{ posts.disease }}" name="disease" required>
            </div>
            <div class="form-group">
                <label for="dept">Department</label>
                <input type="text" class="form-control" id="dept" value="{{ posts.dept }}" name="dept" required>
            </div>
            <div class="form-group form-grid__wide">
                <label for="number">Phone number</label>
                <input type="number" class="form-control" id="number" value="{{ posts.number }}" name="number" required>
            </div>
            <div class="form-actions form-grid__wide">
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</section>
{% endblock body %}
